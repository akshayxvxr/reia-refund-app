<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RÉIA Accounts Portal — {% block title %}{% endblock %}</title>
  {% block extra_head %}{% endblock %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand:       #1A1A18;
      --brand-light: #2E2E2A;
      --gold:        #BFA27A;
      --gold-light:  #D4BA94;
      --gold-pale:   #EDE0CC;
      --cream:       #F8F4EE;
      --cream-dark:  #EDE8DF;
      --ivory:       #FDFAF6;
      --text:        #1A1A18;
      --text-sec:    #4A4A44;
      --muted:       #8A8A80;
      --hint:        #B0AEA6;
      --border:      #DDD8CE;
      --border-light:#EDE8DF;
      --card:        #FFFFFF;
      --bg:          #F5F1EB;
      --mono:        'Courier New', monospace;
      --red:         #C0392B;
      --red-bg:      #FDF0EE;
      --red-border:  #E8C4BF;
      --green:       #2D6A4F;
      --green-bg:    #EAF4EF;
      --green-border:#BDDDD0;
      --amber:       #8B6914;
      --amber-bg:    #FBF4E3;
      --blue:        #1E4A8C;
      --blue-bg:     #EAF0FB;
      --sidebar-w:   240px;
      --header-h:    64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      font-weight: 400;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--brand);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0; top: 0;
      z-index: 100;
      border-right: 1px solid #2E2E2A;
    }

    .sidebar-logo {
      padding: 20px 24px;
      border-bottom: 1px solid #2A2A26;
      display: flex;
      align-items: center;
      background: transparent;
    }

    .sidebar-logo-img {
      width: 130px;
      height: auto;
      display: block;
      filter: grayscale(1) brightness(10) contrast(1.2);
      mix-blend-mode: screen;
      image-rendering: -webkit-optimize-contrast;
    }

    .sidebar-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 20px 0;
    }

    .nav-section {
      padding: 0 16px;
      margin-bottom: 4px;
    }

    .nav-section-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555550;
      padding: 12px 8px 6px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 6px;
      color: #8A8A80;
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s ease;
      margin-bottom: 2px;
    }

    .nav-link svg { flex-shrink: 0; opacity: 0.7; }

    .nav-link:hover {
      background: #2A2A26;
      color: var(--gold-light);
    }

    .nav-link:hover svg { opacity: 1; }

    .nav-link.active {
      background: linear-gradient(135deg, #2A2520 0%, #252520 100%);
      color: var(--gold);
      border-left: 2px solid var(--gold);
      padding-left: 8px;
    }

    .nav-link.active svg { opacity: 1; }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid #2A2A26;
    }

    .sidebar-footer-text {
      font-size: 10px;
      color: #444440;
      letter-spacing: 0.05em;
      line-height: 1.6;
    }

    /* ── Main ── */
    .main-wrap {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      height: var(--header-h);
      background: var(--ivory);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-breadcrumb {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .topbar-breadcrumb strong {
      color: var(--text-sec);
      font-weight: 500;
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-date {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .topbar-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      background: var(--brand);
      padding: 4px 10px;
      border-radius: 4px;
    }

    /* ── Page ── */
    .page {
      padding: 32px;
      max-width: 1200px;
    }

    .page-header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--brand);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .page-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-top: 5px;
      font-weight: 400;
    }

    /* ── KPI Cards ── */
    .kpi-grid, .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .summary-grid { grid-template-columns: repeat(3, 1fr); }

    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-pale) 100%);
    }

    .kpi-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .kpi-val {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--brand);
      line-height: 1;
      letter-spacing: 0.01em;
    }

    .kpi-val.brand { color: var(--brand); }
    .kpi-val.amber { color: var(--amber); }
    .kpi-val.green { color: var(--green); }
    .kpi-val.red   { color: var(--red); }

    .kpi-sub {
      font-size: 10px;
      color: var(--hint);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      background: var(--ivory);
      flex-wrap: wrap;
      gap: 10px;
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--brand);
      letter-spacing: 0.04em;
    }

    /* ── Table ── */
    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: var(--cream);
      color: var(--muted);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 11px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-sec);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr.clickable {
      cursor: pointer;
      transition: background 0.12s ease;
    }

    tbody tr.clickable:hover { background: var(--cream); }

    .amt {
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-align: right;
    }

    .net { color: var(--green); }

    .no-data {
      text-align: center;
      color: var(--hint);
      padding: 48px 16px !important;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
    }

    .no-data a { color: var(--gold); text-decoration: none; }
    .no-data a:hover { text-decoration: underline; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .badge-pending   { background: var(--amber-bg);  color: var(--amber);  border-color: #E8D5A0; }
    .badge-completed { background: var(--green-bg);  color: var(--green);  border-color: var(--green-border); }
    .badge-overdue   { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border); }
    .badge-progress  { background: var(--blue-bg);   color: var(--blue);   border-color: #C0D2F0; }
    .badge-hold      { background: var(--cream-dark);color: var(--muted);  border-color: var(--border); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid transparent;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--brand);
      color: var(--gold-light);
      border-color: var(--brand);
    }

    .btn-primary:hover {
      background: #2A2A26;
      color: var(--gold);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-sec);
      border-color: var(--border);
    }

    .btn-outline:hover {
      background: var(--cream);
      border-color: var(--muted);
    }

    .btn-green {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .btn-green:hover { background: #245A42; }

    .btn-sm {
      padding: 5px 12px;
      font-size: 11px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search {
      height: 34px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--ivory);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text);
      min-width: 180px;
      outline: none;
      transition: border 0.15s;
    }

    .search:focus { border-color: var(--gold); }

    .fsel {
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--ivory);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    /* ── Forms ── */
    .form-wrap {
      max-width: 880px;
    }

    .form-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 28px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .form-section-label:first-child { margin-top: 0; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid.full { grid-template-columns: 1fr; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }

    .form-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .form-input {
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--ivory);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(191,162,122,0.12);
    }

    textarea.form-input {
      height: auto;
      padding: 10px 12px;
      resize: vertical;
    }

    select.form-input { cursor: pointer; }

    .form-input.calc {
      background: var(--cream-dark);
      color: var(--green);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .form-hint {
      font-size: 11px;
      color: var(--hint);
      letter-spacing: 0.02em;
    }

    /* ── Detail grid ── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .detail-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .detail-section-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 7px 0;
      border-bottom: 1px solid var(--border-light);
      gap: 12px;
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--hint);
      flex-shrink: 0;
    }

    .detail-val {
      font-size: 13px;
      color: var(--text-sec);
      text-align: right;
      word-break: break-word;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--hint); }

    /* ── Divider ornament ── */
    .ornament {
      text-align: center;
      color: var(--gold);
      font-size: 16px;
      letter-spacing: 0.3em;
      margin: 8px 0;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="/static/reia_logo.png" alt="RÉIA" class="sidebar-logo-img">
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">Refunds</div>
      <a href="/tracker" class="nav-link {% if request.endpoint == 'tracker' %}active{% endif %}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
        Refund Register
      </a>
      <a href="/entry" class="nav-link {% if request.endpoint == 'entry' %}active{% endif %}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Entry
      </a>
      <a href="/summary" class="nav-link {% if request.endpoint == 'summary' %}active{% endif %}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Summary & Reports
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-footer-text">
      RÉIA<br>
      Accounts Portal
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main-wrap">
  <header class="topbar">
    <div class="topbar-breadcrumb">
      RÉIA &nbsp;/&nbsp; <strong>{% block breadcrumb %}Finance{% endblock %}</strong>
    </div>
    <div class="topbar-right">
      <span class="topbar-date" id="topbar-date"></span>
      <span class="topbar-badge">Internal</span>
      <a href="/logout" style="font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:0.06em;font-weight:500;padding:5px 10px;border:1px solid var(--border);border-radius:5px;transition:all 0.15s" onmouseover="this.style.background='var(--cream)'" onmouseout="this.style.background='transparent'">Sign Out</a>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</div>

<script>
  // Live date
  const d = new Date();
  const opts = { weekday:'short', year:'numeric', month:'short', day:'numeric' };
  document.getElementById('topbar-date').textContent = d.toLocaleDateString('en-IN', opts);
</script>

</body>
</html>
